<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Space — 개인 대시보드</title>
  <meta name="description" content="할 일 관리, 가계부, 메모, 습관 트래커, 캘린더, 북마크가 통합된 개인 대시보드">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css?v=20">
</head>
<body>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">My Space</span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="사이드바 닫기">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="nav-section">
      <p class="nav-label">메인</p>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="#" class="nav-link active" data-view="dashboard" id="nav-dashboard">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-text">대시보드</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="tasks" id="nav-tasks">
            <i class="fas fa-check-circle nav-icon"></i>
            <span class="nav-text">할 일</span>
            <span class="nav-badge" id="taskBadge"></span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="calendar" id="nav-calendar">
            <i class="fas fa-calendar-alt nav-icon"></i>
            <span class="nav-text">캘린더</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="habits" id="nav-habits">
            <i class="fas fa-fire nav-icon"></i>
            <span class="nav-text">습관 트래커</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-section">
      <p class="nav-label">재정 &amp; 기록</p>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="expenses" id="nav-expenses">
            <i class="fas fa-wallet nav-icon"></i>
            <span class="nav-text">가계부</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="notes" id="nav-notes">
            <i class="fas fa-sticky-note nav-icon"></i>
            <span class="nav-text">메모</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="bookmarks" id="nav-bookmarks">
            <i class="fas fa-bookmark nav-icon"></i>
            <span class="nav-text">북마크</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-section">
      <p class="nav-label">자기관리</p>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="pomodoro" id="nav-pomodoro">
            <i class="fas fa-clock nav-icon"></i>
            <span class="nav-text">포모도로</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="mood" id="nav-mood">
            <i class="fas fa-smile nav-icon"></i>
            <span class="nav-text">무드 트래커</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="goals" id="nav-goals">
            <i class="fas fa-bullseye nav-icon"></i>
            <span class="nav-text">목표 관리</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="routine" id="nav-routine">
            <i class="fas fa-list-check nav-icon"></i>
            <span class="nav-text">루틴</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="health" id="nav-health">
            <i class="fas fa-heart nav-icon"></i>
            <span class="nav-text">건강</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="learning" id="nav-learning">
            <i class="fas fa-book nav-icon"></i>
            <span class="nav-text">독서/학습</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="report" id="nav-report">
            <i class="fas fa-chart-bar nav-icon"></i>
            <span class="nav-text">주간 리포트</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-section">
      <ul class="nav-list">
        <li class="nav-item">
          <a href="#" class="nav-link" data-view="settings" id="nav-settings">
            <i class="fas fa-cog nav-icon"></i>
            <span class="nav-text">설정 / 커스터마이즈</span>
          </a>
        </li>
      </ul>
    </div>

      <div class="user-profile" id="userProfile" onclick="openProfileModal()">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">로그인 필요</div>
          <div class="user-email" id="userEmail">클릭하여 수정</div>
        </div>
        <i class="fas fa-pen" style="font-size:11px;color:var(--text-dim);margin-left:auto"></i>
      </div>
      <div class="sync-status" id="syncStatus">
        <span class="sync-dot"></span>
        <span class="sync-text">로컬 저장 중</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="signOutBtn" style="width:100%;justify-content:flex-start;gap:8px;display:none" onclick="signOut()">
        <i class="fas fa-sign-out-alt"></i> 로그아웃
      </button>
    </div>
  </nav>

  <!-- 로그인 화면 -->
  <div class="login-overlay hidden" id="loginOverlay" style="display:none">
    <div class="login-card">
      <div class="login-logo">
        <span style="font-size:36px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">✦</span>
      </div>
      <h1 class="login-title">My Space</h1>
      <p class="login-subtitle">나만의 개인 대시보드에 로그인하세요</p>
      <button class="google-login-btn" id="googleLoginBtn" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google 계정으로 로그인
      </button>
      <p class="login-note">Google 계정으로 안전하게 로그인하여<br>모든 기기에서 데이터를 동기화하세요</p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴 열기">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">대시보드</h1>
        <p class="page-date" id="pageDate"></p>
      </div>
      <div class="topbar-right">
        <div class="weather-widget" id="weatherWidget">
          <i class="fas fa-circle-notch fa-spin" style="font-size:12px"></i>
        </div>
        <button class="quick-add-btn" id="quickAddBtn" aria-label="빠른 추가">
          <i class="fas fa-plus"></i>
          <span>빠른 추가</span>
        </button>
      </div>
    </header>

    <!-- View Container -->
    <div class="view-container" id="viewContainer">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p>로딩 중...</p>
      </div>
    </div>

  </main>

  <!-- Quick Add Dropdown -->
  <div class="quick-add-menu" id="quickAddMenu" role="menu">
    <button class="quick-add-item" data-action="addTask">
      <i class="fas fa-check-circle"></i> 할 일 추가
    </button>
    <button class="quick-add-item" data-action="addExpense">
      <i class="fas fa-wallet"></i> 지출 추가
    </button>
    <button class="quick-add-item" data-action="addNote">
      <i class="fas fa-sticky-note"></i> 메모 추가
    </button>
    <button class="quick-add-item" data-action="addEvent">
      <i class="fas fa-calendar-plus"></i> 일정 추가
    </button>
    <button class="quick-add-item" data-action="addBookmark">
      <i class="fas fa-bookmark"></i> 북마크 추가
    </button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="닫기">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <!-- Firebase Config & App -->
  <script src="firebase-config.js?v=26"></script>
  <script src="app.js?v=26"></script>
  <script src="features.js?v=26"></script>
</body>
</html>
